services:

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq_server
    hostname: rabbit
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - tom-auth-net

  auth10api:    
    container_name: auth10api
    depends_on:
      - rabbitmq
    build:
      context: .
      dockerfile: Auth10Api/Dockerfile 
    env_file:
      - Auth10Api/.env
    ports:
      - "5011:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development     
    volumes:
      - ./dataprotection-keys:/home/app/.aspnet/DataProtection-Keys  
    networks:
      - tom-auth-net

networks:
  tom-auth-net:
    driver: bridge
