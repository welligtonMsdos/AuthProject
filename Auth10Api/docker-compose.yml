services:

  auth10api:    
    container_name: auth10api
    build:
      context: .
      dockerfile: Dockerfile 
    ports:
      - "5011:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./dataprotection-keys:/home/app/.aspnet/DataProtection-Keys  
    networks:
      - tom-auth-net

networks:
  tom-auth-net:
    external: true
